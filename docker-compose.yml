version: '3.8'

services:
  aqi-monitoring:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - API_KEY=${API_KEY:-081060c06310131e81330c727e76f1998b837d57}
      - PROJECT_ROOT=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - aqi-monitoring
    restart: unless-stopped

  # Optional: Database for production
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=aqi_monitoring
      - POSTGRES_USER=aqi_user
      - POSTGRES_PASSWORD=aqi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
