# Streamlit secrets configuration
# Copy this file and add your actual secrets

[api]
# AQI API Key
api_key = "your_aqi_api_key_here"

[database]
# Database configuration
host = "localhost"
port = 5432
name = "aqi_monitoring"
user = "aqi_user"
password = "aqi_password"

[app]
# Application settings
debug = false
log_level = "INFO"
max_workers = 4

[security]
# Security settings
secret_key = "your_secret_key_here"
